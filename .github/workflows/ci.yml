name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6.0
        ports: ['27017:27017']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck + build
        run: npm run build
      - name: Unit tests
        run: npm test --workspace @smartroadmap/api

  smoke:
    runs-on: ubuntu-latest
    needs: build-and-test
    services:
      mongodb:
        image: mongo:6.0
        ports: ['27017:27017']
    env:
      NODE_ENV: development
      PORT: 3000
      FRONTEND_URL: http://localhost:3001
      MONGODB_URI: mongodb://localhost:27017/smartroadmap
      JWT_SECRET: ci_secret_that_is_at_least_thirty_two_chars_long
      JWT_REFRESH_SECRET: ci_refresh_secret_at_least_thirty_two_chars
      BCRYPT_ROUNDS: 10
      MOCK_MODE: 'true'
      SEED_DEMO_CONTENT: 'true'
      AUTH_THROTTLE_LIMIT: '40'   # the suite makes many legitimate logins
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build API
        run: npm run build --workspace @smartroadmap/api
      - name: Start API
        run: |
          node apps/api/dist/main.js &
          for i in $(seq 1 40); do
            curl -sf http://localhost:3000/health && break
            sleep 1
          done
      - name: Smoke test
        run: npm run smoke
