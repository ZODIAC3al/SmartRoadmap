services:
  mongodb:
    image: mongo:6.0
    container_name: smartroadmap-mongodb
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"   # bound to loopback, not 0.0.0.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smartroadmap-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:v1.12.4   # pinned, not :latest
    container_name: smartroadmap-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  piston:
    image: engineerman/piston:latest
    container_name: smartroadmap-piston
    restart: unless-stopped
    ports:
      - "127.0.0.1:2000:2000"

volumes:
  mongodb_data:
  redis_data:
  qdrant_data:
